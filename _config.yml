# Change these two and the whole site (title tag, meta description, OG/Twitter
# tags, JSON-LD) updates automatically — nothing else to touch.
title: خطوط
description: معرض خطوط عربية مجانية للمعاينة والتنزيل والتضمين

# Site domain, no trailing slash. Used to build canonical/OG URLs.
# Change this if the domain changes — everything derives from it.
url: "https://fonts.muaath.dev"

# Uncomment and set if deployed as a GitHub Pages PROJECT page
# (username.github.io/repo-name/) instead of a custom domain or user/org root.
# baseurl: "/repo-name"

lang: ar
github_repo: Muaath5/arabic_fonts
og_image: /assets/img/og-image.png

keep_files:
  - fonts

exclude:
  - build.py
  - README.md
  - LICENSE
  - DATA.md
  - node_modules
  - .github

plugins:
  - jekyll-sitemap
